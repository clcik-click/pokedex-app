name: EAS Build (manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "android | ios | all"
        required: true
        default: "all"
      profile:
        description: "development | preview | production"
        required: true
        default: "preview"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: expo/expo-github-action@main
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest
          expo-cache: false
          eas-cache: false

      - run: npm ci

      - name: Build
        run: |
          if [ "${{ inputs.platform }}" = "android" ]; then
            eas build -p android --profile ${{ inputs.profile }} --non-interactive
          elif [ "${{ inputs.platform }}" = "ios" ]; then
            eas build -p ios --profile ${{ inputs.profile }} --non-interactive
          else
            eas build -p android --profile ${{ inputs.profile }} --non-interactive
            eas build -p ios --profile ${{ inputs.profile }} --non-interactive
          fi
