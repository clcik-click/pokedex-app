name: EAS Update (manual)

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest
          # GitHub cache service was failing; disable caches to avoid random failures
          npm-cache: false
          expo-cache: false

      - run: npm ci

      - run: eas update --auto --non-interactive
