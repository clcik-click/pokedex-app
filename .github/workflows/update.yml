name: EAS Update (manual)

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: expo/expo-github-action@main
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest
          expo-cache: false
          eas-cache: false

      - run: npm ci

      # Set CI=1, don't use --non-interactive, and avoid web by targeting native platforms
      - run: CI=1 eas update --auto --platform ios,android
