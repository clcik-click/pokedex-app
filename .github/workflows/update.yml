name: EAS Update (manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "android | ios | all"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - android
          - ios
      message:
        description: "Update message (shows in EAS / Expo dashboard)"
        required: false
        default: ""
      branch:
        description: "EAS update branch (usually 'main' or 'production')"
        required: false
        default: "main"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest

      - run: npm ci

      - name: EAS Update
        env:
          PLATFORM: ${{ inputs.platform }}
          MSG: ${{ inputs.message }}
          BRANCH: ${{ inputs.branch }}
        run: |
          set -e

          if [ -n "$MSG" ]; then
            eas update --auto --platform "$PLATFORM" --branch "$BRANCH" --message "$MSG" --non-interactive
          else
            eas update --auto --platform "$PLATFORM" --branch "$BRANCH" --non-interactive
          fi
